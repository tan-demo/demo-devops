# LEGACY pipeline for the quote-api service (GitLab CI).
# Part 4 of the assignment: migrate this to GitHub Actions.
# Migrate the INTENT, not the file. Some practices below are exactly
# what we are migrating away from — handle them accordingly and explain
# your decisions in MIGRATION-NOTES.md.
# =====================================================================

stages:
  - test
  - build
  - deploy

variables:
  # NOTE: values below are AWS documentation examples, not live credentials.
  AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
  AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  AWS_DEFAULT_REGION: "ap-southeast-1"
  IMAGE_NAME: "registry.gitlab.com/acme/quote-api"

sonar_check:
  stage: test
  image: sonarsource/sonar-scanner-cli:4.6
  script:
    - sonar-scanner
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.login=$SONAR_TOKEN
        -Dsonar.projectKey=quote_api_old
  allow_failure: true
  only:
    - master

unit_test:
  stage: test
  image: node:16
  script:
    - npm install
    - npm test || echo "tests flaky, continuing"
  only:
    - master

build_image:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME:latest" .
    - docker push "$IMAGE_NAME:latest"
  only:
    - master

deploy_prod:
  stage: deploy
  image: bitnami/kubectl:1.24
  script:
    - echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - kubectl set image deployment/quote-api quote-api="$IMAGE_NAME:latest" -n production
  when: manual
  only:
    - master
