image:
  tag: latest
  pullPolicy: Always

ingress:
  host: quote-api.example.com

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 256Mi

autoscaling:
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 60

pdb:
  enabled: true
  minAvailable: 2

monitoring:
  enabled: true
