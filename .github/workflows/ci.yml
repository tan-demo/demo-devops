name: ci

on:
  push:
    branches: [main]
    paths:
      - "app/quote-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/quote-api/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/quote-api

jobs:
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps + run pytest
        run: |
          pip install -r app/quote-api/requirements.txt httpx pytest
          pytest app/quote-api/test_main.py -q

  sast:
    name: SAST (Semgrep, hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install semgrep
      - name: Semgrep scan (fails the pipeline on any finding)
        run: >-
          semgrep scan --error --verbose
          --config p/default
          --config p/python
          --config p/dockerfile
          --config p/secrets

  build:
    name: Build, scan, push
    needs: [test, sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata (git SHA + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./app/quote-api
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy scan (gate on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        id: push
        with:
          context: ./app/quote-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
