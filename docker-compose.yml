name: demo-devops

services:
  toolbox:
    build:
      context: .
      dockerfile: toolbox/Dockerfile
    image: demo-devops-toolbox:local
    container_name: devops-toolbox
    restart: unless-stopped
    working_dir: /workspace
    environment:
      KUBECONFIG: /kubeconfig/config
      GH_OWNER: ${GH_OWNER:-tan-demo}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - kubeconfig:/kubeconfig
    networks:
      - k3dnet
    healthcheck:
      test: ["CMD", "test", "-f", "/kubeconfig/bootstrap.done"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 120s

volumes:
  kubeconfig:

networks:
  k3dnet:
    name: k3dnet
